[package]
name = "a8c-git-secrets"
version = "0.1.0"
edition = "2021"
authors = ["Your Name <you@example.com>"]
description = "Transparent file encryption in git using symmetric keys"
license = "MIT OR Apache-2.0"

[[bin]]
name = "a8c-git-secrets"
path = "src/main.rs"

[dependencies]
clap = { version = "4.5", features = ["derive"] }
aes = "0.8"
ctr = "0.9"
sha2 = "0.10"
hmac = "0.12"
rand = "0.8"
base64 = "0.22"
git2 = { version = "0.20", features = ["vendored-openssl", "vendored-libgit2"] }
hex = "0.4"
anyhow = "1.0"
thiserror = "1.0"
dirs = "5.0"
walkdir = "2"
indoc = "2.0.7"

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[target.'cfg(windows)'.dependencies]
winapi = { version = "0.3", features = ["winbase", "handleapi", "fileapi"] }

